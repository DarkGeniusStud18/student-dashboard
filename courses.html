<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Cours - Student Dashboard SaaS</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  
  <!-- Global Styles -->
  <link rel="stylesheet" href="css/global-styles.css">
  
  <!-- Courses Page Styles -->
  <link rel="stylesheet" href="css/style-courses.css">
</head>
<body>
  <!-- Courses Page Main Container -->
  <div class="courses-page-main-container">
    <!-- Sidebar Navigation -->
    <aside class="courses-page-sidebar-navigation">
      <div class="courses-page-sidebar-header">
        <div class="courses-page-sidebar-logo-container">
          <svg class="courses-page-sidebar-logo-icon" width="40" height="40" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="64" height="64" rx="12" fill="#0EA5E9"/>
            <path d="M20 32L28 40L44 24" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="courses-page-sidebar-logo-text">Student Dashboard</span>
        </div>
      </div>
      
      <nav class="courses-page-sidebar-navigation-menu">
        <a href="dashboard.html" class="courses-page-sidebar-navigation-link">
          <span class="courses-page-sidebar-navigation-icon">📊</span>
          <span class="courses-page-sidebar-navigation-text">Tableau de bord</span>
        </a>
        <a href="courses.html" class="courses-page-sidebar-navigation-link courses-page-sidebar-navigation-link-active">
          <span class="courses-page-sidebar-navigation-icon">📚</span>
          <span class="courses-page-sidebar-navigation-text">Cours</span>
        </a>
        <a href="grades.html" class="courses-page-sidebar-navigation-link">
          <span class="courses-page-sidebar-navigation-icon">📈</span>
          <span class="courses-page-sidebar-navigation-text">Notes</span>
        </a>
        <a href="schedule.html" class="courses-page-sidebar-navigation-link">
          <span class="courses-page-sidebar-navigation-icon">📅</span>
          <span class="courses-page-sidebar-navigation-text">Emploi du temps</span>
        </a>
        <a href="profile.html" class="courses-page-sidebar-navigation-link">
          <span class="courses-page-sidebar-navigation-icon">👤</span>
          <span class="courses-page-sidebar-navigation-text">Profil</span>
        </a>
      </nav>
      
      <div class="courses-page-sidebar-footer">
        <a href="login.html" class="courses-page-sidebar-logout-link">
          <span class="courses-page-sidebar-logout-icon">🚪</span>
          <span class="courses-page-sidebar-logout-text">Déconnexion</span>
        </a>
      </div>
    </aside>
    
    <!-- Main Content Area -->
    <main class="courses-page-main-content">
      <!-- Header -->
      <header class="courses-page-content-header">
        <div class="courses-page-header-title-section">
          <h1 class="courses-page-header-main-title">Mes Cours</h1>
          <p class="courses-page-header-subtitle-text">Gérez vos cours et suivez votre progression</p>
        </div>
        <div class="courses-page-header-actions-section">
          <button class="courses-page-add-course-button" id="coursesPageAddCourseButton">
            <span class="courses-page-add-course-icon">+</span>
            Ajouter un cours
          </button>
        </div>
      </header>
      
      <!-- Courses Filter Section -->
      <section class="courses-page-filter-section-container">
        <div class="courses-page-filter-group">
          <input 
            type="text" 
            id="coursesPageSearchInput" 
            class="courses-page-search-input-field" 
            placeholder="Rechercher un cours..."
          >
          <select id="coursesPageFilterSelect" class="courses-page-filter-dropdown">
            <option value="all">Tous les cours</option>
            <option value="progress">En progression</option>
            <option value="completed">Terminés</option>
            <option value="not-started">Pas encore commencés</option>
          </select>
        </div>
      </section>
      
      <!-- Courses Grid Container -->
      <section class="courses-page-cards-grid-container" id="coursesPageCardsGridContainer">
        <!-- Course cards will be dynamically generated by JavaScript -->
      </section>
    </main>
  </div>
  
  <!-- Courses Page Script -->
  <script src="js/script-courses.js"></script>
</body>
</html>
