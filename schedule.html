<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emploi du Temps - Student Dashboard SaaS</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  
  <!-- Global Styles -->
  <link rel="stylesheet" href="css/global-styles.css">
  
  <!-- Schedule Page Styles -->
  <link rel="stylesheet" href="css/style-schedule.css">
</head>
<body>
  <!-- Schedule Page Main Container -->
  <div class="schedule-page-main-container">
    <!-- Sidebar Navigation -->
    <aside class="schedule-page-sidebar-navigation">
      <div class="schedule-page-sidebar-header">
        <div class="schedule-page-sidebar-logo-container">
          <svg class="schedule-page-sidebar-logo-icon" width="40" height="40" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="64" height="64" rx="12" fill="#0EA5E9"/>
            <path d="M20 32L28 40L44 24" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="schedule-page-sidebar-logo-text">Student Dashboard</span>
        </div>
      </div>
      
      <nav class="schedule-page-sidebar-navigation-menu">
        <a href="dashboard.html" class="schedule-page-sidebar-navigation-link">
          <span class="schedule-page-sidebar-navigation-icon">📊</span>
          <span class="schedule-page-sidebar-navigation-text">Tableau de bord</span>
        </a>
        <a href="courses.html" class="schedule-page-sidebar-navigation-link">
          <span class="schedule-page-sidebar-navigation-icon">📚</span>
          <span class="schedule-page-sidebar-navigation-text">Cours</span>
        </a>
        <a href="grades.html" class="schedule-page-sidebar-navigation-link">
          <span class="schedule-page-sidebar-navigation-icon">📈</span>
          <span class="schedule-page-sidebar-navigation-text">Notes</span>
        </a>
        <a href="schedule.html" class="schedule-page-sidebar-navigation-link schedule-page-sidebar-navigation-link-active">
          <span class="schedule-page-sidebar-navigation-icon">📅</span>
          <span class="schedule-page-sidebar-navigation-text">Emploi du temps</span>
        </a>
        <a href="profile.html" class="schedule-page-sidebar-navigation-link">
          <span class="schedule-page-sidebar-navigation-icon">👤</span>
          <span class="schedule-page-sidebar-navigation-text">Profil</span>
        </a>
      </nav>
      
      <div class="schedule-page-sidebar-footer">
        <a href="login.html" class="schedule-page-sidebar-logout-link">
          <span class="schedule-page-sidebar-logout-icon">🚪</span>
          <span class="schedule-page-sidebar-logout-text">Déconnexion</span>
        </a>
      </div>
    </aside>
    
    <!-- Main Content Area -->
    <main class="schedule-page-main-content">
      <!-- Header -->
      <header class="schedule-page-content-header">
        <div class="schedule-page-header-title-section">
          <h1 class="schedule-page-header-main-title">Emploi du Temps</h1>
          <p class="schedule-page-header-subtitle-text">Organisez votre semaine de cours</p>
        </div>
        <div class="schedule-page-header-actions-section">
          <button class="schedule-page-navigation-button" id="schedulePagePreviousWeekButton">
            <span class="schedule-page-navigation-icon">◀</span>
            Semaine précédente
          </button>
          <button class="schedule-page-today-button" id="schedulePageTodayButton">
            Aujourd'hui
          </button>
          <button class="schedule-page-navigation-button" id="schedulePageNextWeekButton">
            Semaine suivante
            <span class="schedule-page-navigation-icon">▶</span>
          </button>
        </div>
      </header>
      
      <!-- Current Week Display -->
      <section class="schedule-page-week-display-container">
        <h2 class="schedule-page-week-title" id="schedulePageWeekTitleDisplay">Semaine du 23 Mars 2026</h2>
        <div class="schedule-page-week-navigation-actions">
          <button class="schedule-page-view-toggle-button schedule-page-view-toggle-button-active" data-view="week">
            Semaine
          </button>
          <button class="schedule-page-view-toggle-button" data-view="day">
            Jour
          </button>
        </div>
      </section>
      
      <!-- Schedule Grid Container -->
      <section class="schedule-page-grid-container" id="schedulePageWeeklyGridContainer">
        <!-- Schedule grid will be dynamically generated by JavaScript -->
      </section>
      
      <!-- Upcoming Events Section -->
      <section class="schedule-page-upcoming-events-section-container">
        <h2 class="schedule-page-upcoming-events-title">Événements à Venir</h2>
        <div class="schedule-page-upcoming-events-list-container" id="schedulePageUpcomingEventsListContainer">
          <!-- Events will be dynamically generated by JavaScript -->
        </div>
      </section>
    </main>
  </div>
  
  <!-- Schedule Page Script -->
  <script src="js/script-schedule.js"></script>
</body>
</html>
